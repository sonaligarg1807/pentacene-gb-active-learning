# configs/seed_generation.yaml
# Dimer sampling with twisting along the a and b axes, and rotation around the normal to the plane of the monomer with a misorientation angle of 0-90 degrees.
# Expanded seed generation: denser angle sampling, multiple separations per
# combination, and small slip/jitter perturbations to add realistic disorder.

input_monomer: "/Users/sonaligarg/Desktop/Phd_data/git-repo/pentacene-gb-active-learning/data/seed_structures/pentacene_monomer.xyz"
output_dir: "/Users/sonaligarg/Desktop/Phd_data/git-repo/pentacene-gb-active-learning/data/seed_structures/generated_dimers"
manifest_file: "/Users/sonaligarg/Desktop/Phd_data/git-repo/pentacene-gb-active-learning/data/seed_structures/seed_dimers_manifest.csv"

# Denser angle sampling: step reduced from 15 to 5 degrees -> 19 angles
angle_range:
  start: 0
  stop: 90
  step: 5

rotation_axes:
  a_axis: [1.0000, 0.0000, 0.0000]
  b_axis: [0.0954, 0.9954, 0.0000]
  normal_ac: [0.0000, -0.9739, 0.2270]
  normal_bc: [0.9953, -0.0954, -0.0133]

# Starting separation before overlap check (same as before)
initial_stack_separation: 3.5
min_allowed_distance: 2.0
separation_increment: 0.1
max_stack_separation: 20.0

# NEW: additional separations sampled beyond the overlap-safe minimum,
# to teach the model how energy changes with pi-stack distance.
extra_separation_offsets: [0.0, 0.3, 0.7, 1.5]   # Angstrom, added on top of the safe minimum

# NEW: small random in-plane slip applied per structure (Angstrom)
slip_range: [-0.5, 0.5]

# NEW: small random per-atom thermal jitter applied to a fraction of structures
jitter_std_angstrom: 0.05     # standard deviation of random atomic displacement
jitter_fraction: 0.3          # fraction of generated structures that get jitter applied

random_seed: 42