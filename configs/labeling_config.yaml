# configs/labeling_config.yaml
# Settings for ground-truth labeling using GFN2-xTB single-point calculations.

input_dir: "/Users/sonaligarg/Desktop/Phd_data/git-repo/pentacene-gb-active-learning/data/seed_structures/generated_dimers"
manifest_file: "/Users/sonaligarg/Desktop/Phd_data/git-repo/pentacene-gb-active-learning/data/seed_structures/seed_dimers_manifest.csv"

# Output: a single extended XYZ file containing all labeled structures
# (energy + forces embedded), ready for MACE training.
