# configs/mace_finetune_config.yaml
# Fine-tunes the pretrained MACE-OFF23 foundation model on the pentacene
# GB seed dataset, instead of training from scratch.

name: "gb_al_round1"
seed: 299

train_file: "/home/sgarg/git-repo/pentacene-gb-active-learning/data/labeled_data/gb_al_round1_train.xyz"
valid_file: "/home/sgarg/git-repo/pentacene-gb-active-learning/data/labeled_data/valid.xyz"

energy_key: "REF_energy"
forces_key: "REF_forces"

# Path to the downloaded foundation model checkpoint (update after Step 1)
foundation_model: "/home/sgarg/git-repo/pentacene-gb-active-learning/output/models/finetune_v1_seed99/pentacene_finetune_v1.model"

# Fine-tuning settings: smaller learning rate than scratch training,
# since we're adapting existing weights, not learning from zero.
lr: 0.0002
batch_size: 8
max_num_epochs: 60
weight_decay: 5e-7

energy_weight: 1.0
forces_weight: 100.0

model_dir: "/home/sgarg/git-repo/pentacene-gb-active-learning/output/gb_al_round1/retrain_v1_seed299"
log_dir: "/home/sgarg/git-repo/pentacene-gb-active-learning/output/gb_al_round1/retrain_v1_seed299/logs"
checkpoints_dir: "/home/sgarg/git-repo/pentacene-gb-active-learning/output/gb_al_round1/retrain_v1_seed299/checkpoints"

device: "cuda"
multiheads_finetuning: false
E0s: "average"
default_dtype: "float32"